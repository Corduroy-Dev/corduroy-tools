# Deal Analyzer — managed-agent cookbook

name: deal-analyzer
model: claude-opus-4-7

system:
  file: ../../agents/deal-analyzer/agents/deal-analyzer.md
  append: "You are running headless. Produce files in ./out/; do not assume an open editor or local environment."

tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
      - { name: glob, enabled: true }

skills:
  - { from_plugin: ../../agents/deal-analyzer }

callable_agents:
  - { manifest: ./subagents/researcher.yaml }
  - { manifest: ./subagents/underwriter.yaml }
  - { manifest: ./subagents/memo-writer.yaml }   # only leaf with Write

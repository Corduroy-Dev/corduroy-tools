name: deal-researcher
model: claude-opus-4-7
system:
  text: |
    You read OMs, rent rolls, and market context for a real-estate acquisition
    workup. You extract every economically material fact (in-place NOI, asking
    cap, occupancy, concession density, lease expirations, top tenants, market
    rent trends, supply pipeline) and return structured JSON. You do not write
    the IC memo or the audit report — the memo-writer does. You do not opine —
    the underwriter does. Be a careful reader.
tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
      - { name: glob, enabled: true }
skills:
  - { path: ../../../agents/deal-analyzer/skills/om-analyzer }
  - { path: ../../../agents/deal-analyzer/skills/rent-roll-intelligence }
  - { path: ../../../agents/deal-analyzer/skills/market-snapshot }
callable_agents: []
